services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    environment:
      - PORT=8000
      - SQLITE_JOURNAL_MODE=${SQLITE_JOURNAL_MODE:-DELETE}
      - SQLITE_MMAP_SIZE=${SQLITE_MMAP_SIZE:-0}
      # Set RESET_DB_ON_STARTUP=true in .env to reset database on container startup
      # Useful for development to start with clean slate
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-include "*.yaml"
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    # For Vite dev server
    command: npm run dev -- --host
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
